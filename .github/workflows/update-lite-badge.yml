name: Update Lite Badge

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      version:
        description: "Lite version, e.g. v1.0.9"
        required: true

permissions:
  contents: write

jobs:
  update-lite-badge:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.release.name, 'Lite') || contains(github.event.release.name, 'lite')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lite branch
        uses: actions/checkout@v4
        with:
          ref: lite

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update badge json
        run: |
          mkdir -p .github/badges
          cat > .github/badges/lite-version.json <<EOF
          {
            "schemaVersion": 1,
            "label": "Lite 轻量版本",
            "message": "${{ steps.version.outputs.value }}",
            "color": "2ea44f"
          }
          EOF

      - name: Commit badge json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/lite-version.json
          git commit -m "Update lite badge to ${{ steps.version.outputs.value }}" || exit 0
          git push origin lite

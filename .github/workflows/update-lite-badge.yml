name: Update Lite Badge

on:
  release:
    types: [published, edited]

permissions:
  contents: write

jobs:
  update-lite-badge:
    if: contains(github.event.release.name, 'Lite')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lite branch
        uses: actions/checkout@v4
        with:
          ref: lite

      - name: Update badge json
        run: |
          mkdir -p .github/badges

          VERSION="${{ github.event.release.tag_name }}"

          cat > .github/badges/lite-version.json <<EOF
          {
            "schemaVersion": 1,
            "label": "Lite Version",
            "message": "$VERSION",
            "color": "2ea44f"
          }
          EOF

      - name: Commit badge json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .github/badges/lite-version.json
          git commit -m "Update lite badge to ${{ github.event.release.tag_name }}" || exit 0
          git push origin lite
